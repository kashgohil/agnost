services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agnost-postgres
    environment:
      POSTGRES_USER: agnost
      POSTGRES_PASSWORD: agnost
      POSTGRES_DB: agnost
    ports:
      # Mapped to 5433 on host because 5432 commonly conflicts with a local
      # Postgres install. Change here and in .env if you want the default.
      - "5433:5432"
    volumes:
      - agnost_pgdata:/var/lib/postgresql/data
      # Runs on first init of a fresh volume. Enables pgvector. For existing
      # volumes, run: docker exec -it agnost-postgres psql -U agnost -d agnost \
      #               -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - ./docker/init-extensions.sql:/docker-entrypoint-initdb.d/01-extensions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agnost -d agnost"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  agnost_pgdata:
