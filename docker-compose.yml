services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agnost-postgres
    environment:
      POSTGRES_USER: agnost
      POSTGRES_PASSWORD: agnost
      POSTGRES_DB: agnost
    ports:
      - "5432:5432"
    volumes:
      - agnost_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agnost -d agnost"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  agnost_pgdata:
